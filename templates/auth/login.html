{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="login-wrapper">   <!-- center -->
    <div class="login-card">   <!-- form border  White box / main card-->

        <div class="logo-icon"> <i class="fa-solid fa-graduation-cap"></i></div>  <!-- Round blue icon circle--> 
        <div class="logo-title">EduPortal</div>
        <div class="logo-sub">Student Management System</div>

        <div class="badge-row">     <!-- Teen role badges -->
            <span class="role-badge">Admin</span>
            <span class="role-badge">Teacher</span>
            <span class="role-badge">Student</span>
        </div>

        {% if messages %}   <!-- Django error messages -->
            {% for message in messages %}
                <div class="error-msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}  <!-- Security token -->

            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-user"></i> Username</label> <!-- fa -solid -->
                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter your username"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter your password"
                       required>
            </div>

            <button type="submit" class="btn-login">
                LOGIN →
            </button>

            <div class="text-center mt-2">
                 <a href="/forgot-password/" style="color: #4169e1; font-size: 13px;">Forgot Password?</a>
            </div>

        </form>

        <hr class="divider">

        <div class="register-link">
            Don't have an account?
            <a href="/register/">Register here</a>
        </div>

    </div>
</div>

</body>
</html>
