{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/todo.css' %}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-left">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>EduPortal</span>
    </div>
    <div class="nav-right">
        <a href="/todos/" class="nav-link">
            <i class="fa-solid fa-list-check"></i> My Tasks
        </a>
        <a href="/logout/" class="btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>
</nav>

<div class="todo-wrapper">

    <div class="page-header">
        <h2><i class="fa-solid fa-pen"></i> Edit Task</h2>
        <p>Update your task details</p>
    </div>

    <div class="add-task-card">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    <i class="fa-solid fa-heading"></i> Task Title
                </label>
                <input type="text"
                       name="title"
                       class="form-control"
                       value="{{ todo.title }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="fa-solid fa-align-left"></i> Description
                </label>
                <textarea name="description"
                          class="form-control"
                          rows="3">{{ todo.description }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="fa-solid fa-flag"></i> Status
                </label>
                <select name="status" class="form-control">
                    <option value="pending" {% if todo.status == 'pending' %}selected{% endif %}>Pending</option>
                    <option value="completed" {% if todo.status == 'completed' %}selected{% endif %}>Completed</option>
                </select>
            </div>

            <div class="edit-buttons">
                <button type="submit" class="btn-add">
                    <i class="fa-solid fa-save"></i> Save Changes
                </button>
                <a href="/todos/" class="btn-cancel">
                    <i class="fa-solid fa-xmark"></i> Cancel
                </a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
