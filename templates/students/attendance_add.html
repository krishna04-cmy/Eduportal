{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/students.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>EduPortal</span>
    </div>
    <div class="nav-right">
        <a href="/students/" class="nav-link">
            <i class="fa-solid fa-users"></i> Students
        </a>
        <a href="/logout/" class="btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>
</nav>

<div class="students-wrapper">

    <div class="page-header">
        <h2><i class="fa-solid fa-calendar-check"></i> Mark Attendance</h2>
        <p>Student: <strong>{{ student.name }}</strong> — Roll No: {{ student.roll_number }}</p>
    </div>

    <div class="form-card">

        {% if messages %}
            {% for message in messages %}
                <div class="alert-msg {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    <i class="fa-solid fa-calendar"></i> Date
                </label>
                <input type="date" name="date" class="form-control" 
                   value="{{today}}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="fa-solid fa-flag"></i> Status
                </label>
                <select name="status" class="form-control" required>
                    <option value="present">Present</option>
                    <option value="absent">Absent</option>
                    <option value="late">Late</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="fa-solid fa-comment"></i> Remarks
                </label>
                <input type="text" name="remarks" class="form-control"
                       placeholder="Optional remarks">
            </div>

            <div class="edit-buttons">
                <button type="submit" class="btn-add">
                    <i class="fa-solid fa-check"></i> Mark Attendance
                </button>
                <a href="/students/{{ student.pk }}/" class="btn-cancel">
                    <i class="fa-solid fa-xmark"></i> Cancel
                </a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
