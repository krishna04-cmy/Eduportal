{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/students.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>EduPortal</span>
    </div>
    <div class="nav-right">
        <a href="/students/" class="nav-link">
            <i class="fa-solid fa-users"></i> Students
        </a>
        <a href="/logout/" class="btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>
</nav>

<div class="students-wrapper">

    <div class="page-header">
        <h2><i class="fa-solid fa-user-plus"></i> Add New Student</h2>
        <p>Fill in student details</p>
    </div>

    <div class="form-card">

        {% if messages %}
            {% for message in messages %}
                <div class="alert-msg {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-grid">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-user"></i> Full Name
                    </label>
                    <input type="text" name="name" class="form-control"
                           placeholder="Enter full name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-envelope"></i> Email
                    </label>
                    <input type="email" name="email" class="form-control"
                           placeholder="Enter email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-phone"></i> Phone
                    </label>
                    <input type="text" name="phone" class="form-control"
                           placeholder="Enter phone number">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-venus-mars"></i> Gender
                    </label>
                    <select name="gender" class="form-control" required>
                        <option value="">-- Select Gender --</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-calendar"></i> Date of Birth
                    </label>
                    <input type="date" name="date_of_birth" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-school"></i> Class
                    </label>
                    <input type="text" name="class_name" class="form-control"
                           placeholder="e.g. 10th A" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-id-card"></i> Roll Number
                    </label>
                    <input type="text" name="roll_number" class="form-control"
                           placeholder="e.g. 2024001" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-location-dot"></i> Address
                    </label>
                    <textarea name="address" class="form-control"
                              rows="2" placeholder="Enter address"></textarea>
                </div>
            </div>

            <div class="edit-buttons">
                <button type="submit" class="btn-add">
                    <i class="fa-solid fa-user-plus"></i> Add Student
                </button>
                <a href="/students/" class="btn-cancel">
                    <i class="fa-solid fa-xmark"></i> Cancel
                </a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
