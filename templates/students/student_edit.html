{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/students.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>EduPortal</span>
    </div>
    <div class="nav-right">
        <a href="/students/" class="nav-link">
            <i class="fa-solid fa-users"></i> Students
        </a>
        <a href="/logout/" class="btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>
</nav>

<div class="students-wrapper">

    <div class="page-header">
        <h2><i class="fa-solid fa-pen"></i> Edit Student</h2>
        <p>Update student details</p>
    </div>

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}

            <div class="form-grid">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-user"></i> Full Name
                    </label>
                    <input type="text" name="name" class="form-control"
                           value="{{ student.name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-envelope"></i> Email
                    </label>
                    <input type="email" name="email" class="form-control"
                           value="{{ student.email }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-phone"></i> Phone
                    </label>
                    <input type="text" name="phone" class="form-control"
                           value="{{ student.phone }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-venus-mars"></i> Gender
                    </label>
                    <select name="gender" class="form-control" required>
                        <option value="male" {% if student.gender == 'male' %}selected{% endif %}>Male</option>
                        <option value="female" {% if student.gender == 'female' %}selected{% endif %}>Female</option>
                        <option value="other" {% if student.gender == 'other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-calendar"></i> Date of Birth
                    </label>
                    <input type="date" name="date_of_birth" class="form-control"
                           value="{{ student.date_of_birth }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-school"></i> Class
                    </label>
                    <input type="text" name="class_name" class="form-control"
                           value="{{ student.class_name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-id-card"></i> Roll Number
                    </label>
                    <input type="text" name="roll_number" class="form-control"
                           value="{{ student.roll_number }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-lo
