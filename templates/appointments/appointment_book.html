{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - EduPortal</title>
    <link rel="stylesheet" href="{% static 'css/appointments.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background:#dbeafe; min-height:100vh; font-family:'Segoe UI',sans-serif;">

<nav class="navbar">
    <div class="nav-left">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>EduPortal</span>
    </div>
    <div class="nav-right">
        <span class="welcome-text">Welcome, {{ request.user.username }}!</span>
    </div>
</nav>

<div class="appointments-wrapper" style="max-width:500px;">
    <div class="page-header">
        <h2><i class="fa-solid fa-calendar-plus"></i> Book Appointment</h2>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" class="form-control"
                       placeholder="e.g. Math doubt session" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control"
                          placeholder="Describe your appointment..." rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Time</label>
                <input type="time" name="time" class="form-control" required>
            </div>
            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-calendar-plus"></i> Book Appointment
            </button>
            <a href="/appointments/" class="btn-cancel">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
