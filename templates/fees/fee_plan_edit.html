{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Fee Plan - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/fees.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>EduPortal</span>
    </div>
    <div class="nav-right">
        <a href="/fees/" class="nav-link">
            <i class="fa-solid fa-rupee-sign"></i> Fee Plans
        </a>
        <a href="/logout/" class="btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>
</nav>

<div class="fees-wrapper">
    <div class="page-header">
        <h2><i class="fa-solid fa-pen"></i> Edit Fee Plan</h2>
        <p>Update fee plan details</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert-msg {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Plan Name</label>
                <input type="text" name="name" class="form-control" value="{{ fee_plan.name }}" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control">{{ fee_plan.description }}</textarea>
            </div>
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" name="amount" class="form-control" value="{{ fee_plan.amount }}" required>
            </div>
            <div class="form-group">
                <label>Duration</label>
                <input type="text" name="duration" class="form-control" value="{{ fee_plan.duration }}" required>
            </div>
            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-pen"></i> Update Fee Plan
            </button>
            <a href="/fees/" class="btn-cancel">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
