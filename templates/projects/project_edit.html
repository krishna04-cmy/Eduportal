{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/projects.css' %}">
</head>
<body>
<!-- Top Navbar Only -->
<nav class="topnav">
    <div class="nav-left">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>EduPortal</span>
    </div>
    <div class="nav-right">
        <span class="welcome-text">Welcome, {{ request.user.username }}!</span>
    </div>
</nav>

<div class="projects-wrapper" style="max-width:500px;">
    <div class="page-header">
        <h2><i class="fa-solid fa-pen"></i> Edit Project</h2>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" class="form-control" value="{{ project.title }}" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="3">{{ project.description }}</textarea>
            </div>
            <div class="form-group">
                <label>Deadline</label>
                <input type="date" name="deadline" class="form-control" value="{{ project.deadline }}" required>
            </div>
            <div class="form-group">
                <label>Select Students</label>
                <select name="students" class="form-control" multiple style="height:120px;">
                    {% for student in students %}
                    <option value="{{ student.pk }}"
                        {% if student in project.students.all %}selected{% endif %}>
                        {{ student.username }}
                    </option>
                    {% endfor %}
                </select>
                <small style="color:#64748b;">Ctrl + Click to select multiple</small>
            </div>
            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-pen"></i> Update Project
            </button>
            <a href="/projects/{{ project.pk }}/" class="btn-cancel">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
