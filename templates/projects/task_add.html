{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/projects.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>EduPortal</span>
    </div>
    
        <a href="/logout/" class="btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>
</nav>

<div class="projects-wrapper" style="max-width:500px;">
    <div class="page-header">
        <h2><i class="fa-solid fa-plus"></i> Add Task</h2>
        <!--<p>{{ project.title }}</p>-->
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Task Title</label>
                <input type="text" name="title" class="form-control" placeholder="e.g. Research topic" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Task details..."></textarea>
            </div>
            <div class="form-group">
                <label>Assign To</label>
                <select name="assigned_to" class="form-control" required>
                    {% for student in students %}
                    <option value="{{ student.pk }}">{{ student.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Deadline</label>
                <input type="date" name="deadline" class="form-control" required>
            </div>
            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-plus"></i> Add Task
            </button>
            <a href="/projects/{{ project.pk }}/" class="btn-cancel">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
