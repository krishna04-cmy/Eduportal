{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/chat.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>EduPortal</span>
    </div>
    <div class="nav-right">
        <span class="welcome-text">Welcome, {{ request.user.username }}!</span>
    </div>
</nav>
<div class="chat-wrapper">

    <!-- Chat Header -->
    <div class="chat-header">
        <a href="/chat/" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="chat-user-info">
            <div class="chat-avatar">
                <i class="fa-solid fa-user"></i>
                <span class="status-dot {% if is_online %}online{% else %}offline{% endif %}"></span>
            </div>
            <div>
                <h5>{{ other_user.username }}</h5>
                <p>{% if is_online %}<span class="online-text">Online</span>{% else %}<span class="offline-text">Offline</span>{% endif %}</p>
            </div>
        </div>
    </div>

    <!-- Messages -->
    <div class="messages-box" id="messages-box">
        {% for message in messages %}
        <div class="message {% if message.sender == request.user %}sent{% else %}received{% endif %}">
            <div class="message-bubble">
                <p>{{ message.content }}</p>
                <span class="message-time">{{ message.timestamp|date:"h:i A" }}</span>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Input -->
    <div class="chat-input-box">
        <input type="text" id="message-input" 
               class="chat-input" 
               placeholder="Type a message..."
               autocomplete="off">
        <button id="send-btn" class="send-btn">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

</div>

<script>
    const roomName = "{{ room_name }}";
    const currentUser = "{{ request.user.username }}";

    // WebSocket connection
    const socket = new WebSocket(
    'ws://' + window.location.host + '/ws/chat/' + roomName + '/'
);

    socket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        addMessage(data.message, data.username);
    };

    socket.onclose = function(e) {
        console.log('Chat socket closed!');
    };

    // Message bhejo
    document.getElementById('send-btn').onclick = function() {
        sendMessage();
    };

    document.getElementById('message-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    function sendMessage() {
        const input = document.getElementById('message-input');
        const message = input.value.trim();
        if (message) {
            socket.send(JSON.stringify({'message': message}));
            input.value = '';
        }
    }

    function addMessage(message, username) {
        const box = document.getElementById('messages-box');
        const div = document.createElement('div');
        div.className = 'message ' + (username === currentUser ? 'sent' : 'received');
        div.innerHTML = `
            <div class="message-bubble">
                <p>${message}</p>
                <span class="message-time">Just now</span>
            </div>
        `;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // Auto scroll
    const box = document.getElementById('messages-box');
    box.scrollTop = box.scrollHeight;
</script>

</body>
</html>
